<link rel="stylesheet" href="styles.css">

<header>
    <h1>User Directory</h1>
</header>

<div class="container">
    <h2>Users</h2>
    <ul id="list"></ul>
</div>

<script>
fetch("/api/users")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(u => {
      html += `<li><strong>${u.name}</strong><br>${u.email}</li>`;
    });
    document.getElementById("list").innerHTML = html;
  });   
</script>

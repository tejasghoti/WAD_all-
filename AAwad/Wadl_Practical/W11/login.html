<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <input
        type="text"
        id="loginUser"
        placeholder="Enter username"
    >

    <input
        type="password"
        id="loginPass"
        placeholder="Enter password"
    >

    <button id="loginBtn">
        Login
    </button>

    <p>
        New user?
        <a href="register.html">Register</a>
    </p>

    <div id="result"></div>
</div>

<script src="db.js"></script>
</body>
</html>

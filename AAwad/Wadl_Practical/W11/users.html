<!DOCTYPE html>
<html lang="en">

<head>
    <title>Users List</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="container">
        <h2>Registered Users</h2>

        <table border="1" width="100%" cellspacing="0" cellpadding="10">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>

    </div>

    <script>
        const users =
            JSON.parse(localStorage.getItem("users")) || [];

        let output = "";

        users.forEach(user => {
            output += `
        <tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.mobile}</td>
            <td>${user.city}</td>
        </tr>
    `;
        });

        document.getElementById("list").innerHTML = output;
    </script>

</body>

</html>

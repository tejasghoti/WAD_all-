<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Facebook Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body class="bg-light">

    <!-- TOP BAR -->
    <nav class=" navbar bg-primary text-black p-2">
        <div class="container d-flex justify-content-between align-items-center">

            <h2 class="mb-0">facebook</h2>

            <div class="d-flex gap-2">
                <input type="text" placeholder="Email" class="form-control form-control-sm">
                <input type="password" placeholder="Password" class="form-control form-control-sm">
                <button class="btn btn-light btn-sm">Login</button>
            </div>

        </div>
    </nav>

    <!-- MAIN -->
    <div class="container mt-5">
        <div class="row">

            <!-- LEFT -->
            <div class="col-md-6">
                <h4>Facebook is useless without friends.<br>Make More Friends.</h4>
                <img src="images/fb.png" class="img-fluid mt-3">
            </div>

            <!-- RIGHT -->
            <div class="col-md-6">
                <h2>Create an Account</h2>
                <p>It's free and always will be.</p>

                <form>
                    <div class="mb-2 d-flex gap-4">
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Firstname">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Lastname">
                        </div>
                    </div>

                    <input type="email" class="form-control mb-2" placeholder="Email">
                    <input type="email" class="form-control mb-2" placeholder="Re-enter email">
                    <input type="password" class="form-control mb-2" placeholder="Password">
                    <input type="date" class="form-control mb-2">

                    <div class="mb-2">
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender" class="ms-3"> Female
                    </div>

                    <button class="btn btn-success">Signup</button>
                </form>
            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>

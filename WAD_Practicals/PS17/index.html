<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #eef2f5; 
            padding: 20px; 
            text-align: center; 
        }
        h2 { color: #333; margin-bottom: 30px; }
        
        /* Grid Layout */
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        
        /* Employee Card Styling */
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            width: 250px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { 
            border-radius: 50%; 
            width: 100px; 
            height: 100px; 
            border: 3px solid #eee;
            margin-bottom: 10px;
        }
        .card h3 { margin: 0; color: #222; }
        .card .designation { 
            color: #007bff; 
            font-weight: bold; 
            margin: 5px 0 10px 0;
            font-size: 0.9em;
        }
        .card p { margin: 5px 0; color: #666; font-size: 0.9em; }
        .card .salary { 
            color: #28a745; 
            font-weight: bold; 
            margin-top: 15px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h2>Corporate Employee Directory</h2>
    
    <div id="employee-grid" class="grid">
        <p style="color: gray;">Loading employees from Node API...</p>
    </div>

    <script>
        // Fetch employee data from the Node.js API
        // Using absolute URL http://localhost:3003 ensures it works with Live Server
        fetch('http://localhost:3003/api/employees')
            .then(res => {
                if (!res.ok) throw new Error("Server error");
                return res.json();
            })
            .then(employees => {
                const grid = document.getElementById('employee-grid');
                grid.innerHTML = ''; // Clear loading text
                
                // Dynamically build the cards
                employees.forEach(emp => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${emp.image}" alt="${emp.name}">
                            <h3>${emp.name}</h3>
                            <p class="designation">${emp.designation}</p>
                            <p><strong>Department:</strong> ${emp.department}</p>
                            <p class="salary">Salary: ${emp.salary}</p>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('employee-grid').innerHTML = 
                    '<p style="color:red;">Error loading data. Is the Node server running?</p>';
            });
    </script>

</body>
</html>

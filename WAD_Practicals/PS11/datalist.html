<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registered Users Data List</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 900px;
            margin: auto;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td { 
            border: 1px solid #ccc; 
            padding: 12px; 
            text-align: left; 
        }
        th { 
            background: #28a745; 
            color: white;
        }
        tr:nth-child(even) { background-color: #f2f2f2; }
        a.back-btn { 
            display: inline-block; 
            margin-bottom: 20px; 
            padding: 8px 15px;
            background: #007bff; 
            color: white; 
            text-decoration: none; 
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2>Registered Users Data List</h2>
    <a href="index.html" class="back-btn">&larr; Back to Registration</a>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>DOB</th>
                <th>City</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Local storage data will be populated here -->
        </tbody>
    </table>

    <script>
        // 1. Fetch the data array from local storage
        let usersList = JSON.parse(localStorage.getItem("usersList")) || [];
        const tbody = document.getElementById("tableBody");

        // 2. Check if array is empty
        if (usersList.length === 0) {
            tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No users registered yet.</td></tr>";
        } else {
            // 3. Loop through the array and dynamically create table rows
            usersList.forEach(user => {
                const row = `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.mobile}</td>
                        <td>${user.dob}</td>
                        <td>${user.city}</td>
                        <td>${user.address}</td>
                    </tr>
                `;
                // Append row to the table body
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>

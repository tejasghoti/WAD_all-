<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration</title>
    <style>
        /* Minimal styling to display forms side-by-side */
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            gap: 40px; 
            justify-content: center; 
            margin-top: 50px; 
            background-color: #f4f4f4;
        }
        .form-box { 
            background: white; 
            border: 1px solid #ccc; 
            padding: 20px; 
            border-radius: 5px; 
            width: 300px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input, select, textarea { 
            width: 90%; 
            padding: 10px; 
            margin-bottom: 15px; 
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        button { 
            padding: 10px; 
            width: 97%; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            font-size: 16px;
        }
        button.login-btn { background: #007bff; }
    </style>
</head>
<body>

    <!-- Registration Form -->
    <div class="form-box">
        <h3 style="color: #28a745;">Registration Form</h3>
        
        <!-- HTML5 attributes like 'required', 'type="email"', and 'pattern' provide the validation -->
        <form id="regForm" onsubmit="handleRegistration(event)">
            <input type="text" id="name" placeholder="Full Name" required>
            
            <input type="email" id="email" placeholder="Email Address" required>
            
            <input type="text" id="mobile" placeholder="Mobile Number (10 digits)" pattern="[0-9]{10}" title="Please enter exactly 10 digits" required>
            
            <input type="date" id="dob" required>
            
            <select id="city" required>
                <option value="">Select City...</option>
                <option value="Pune">Pune</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Delhi">Delhi</option>
            </select>
            
            <textarea id="address" placeholder="Full Address" rows="3" required></textarea>
            
            <button type="submit">Register via AJAX POST</button>
        </form>
        <div id="regMsg" style="color: green; margin-top: 10px; font-size: 14px; text-align: center;"></div>
    </div>

    <!-- Login Form -->
    <div class="form-box">
        <h3 style="color: #007bff;">Login Form</h3>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required minlength="4">
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        // A free mock API endpoint to simulate sending data to a real server via AJAX
        const AJAX_ENDPOINT = "https://jsonplaceholder.typicode.com/posts";

        function handleRegistration(event) {
            // 1. Prevent the page from refreshing when the form is submitted
            event.preventDefault(); 

            // 2. Gather the validated data from the form
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                mobile: document.getElementById('mobile').value,
                dob: document.getElementById('dob').value,
                city: document.getElementById('city').value,
                address: document.getElementById('address').value
            };

            document.getElementById('regMsg').innerText = "Sending AJAX POST...";

            // 3. Perform AJAX POST method using Fetch API
            fetch(AJAX_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(response => response.json())
            .then(data => {
                // 4. Upon successful AJAX response, push the data to a Local Storage Array
                
                // Get existing users array from local storage, or create a new empty array if it doesn't exist
                let usersList = JSON.parse(localStorage.getItem("usersList")) || [];
                
                // Push new user to array
                usersList.push(userData);
                
                // Save updated array back to local storage
                localStorage.setItem("usersList", JSON.stringify(usersList));

                document.getElementById('regMsg').innerText = "Success! Redirecting to data list...";
                
                // 5. Redirect to the new page to display the data list
                setTimeout(() => {
                    window.location.href = "datalist.html";
                }, 1500);
            })
            .catch(error => {
                document.getElementById('regMsg').style.color = "red";
                document.getElementById('regMsg').innerText = "AJAX Error occurred.";
            });
        }

        function handleLogin(event) {
            event.preventDefault();
            // Basic HTML5 validation ensures fields are filled before this runs.
            alert("Login form submitted! To see the data list functionality, please use the Registration form.");
        }
    </script>

</body>
</html>

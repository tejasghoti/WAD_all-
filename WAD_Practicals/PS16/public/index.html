<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Art Gallery</title>
    <!-- Linking an external CSS file to test if our Node server serves .css files properly -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Lumina Art Gallery</h1>
        <p>Discover the beauty of modern expressions</p>
    </header>

    <div class="gallery">
        <div class="art-piece">
            <img src="https://via.placeholder.com/300x200/ff7f50/ffffff?text=Abstract+Warmth" alt="Art 1">
            <h3>Abstract Warmth</h3>
            <p>Oil on Canvas, 2023</p>
        </div>
        <div class="art-piece">
            <img src="https://via.placeholder.com/300x200/4682b4/ffffff?text=Oceanic+Dreams" alt="Art 2">
            <h3>Oceanic Dreams</h3>
            <p>Watercolor, 2024</p>
        </div>
        <div class="art-piece">
            <img src="https://via.placeholder.com/300x200/2e8b57/ffffff?text=Forest+Echoes" alt="Art 3">
            <h3>Forest Echoes</h3>
            <p>Acrylic, 2022</p>
        </div>
    </div>

    <footer>
        <p>Visit us at: 123 Creative Lane, Art District | Open Mon-Sat, 10 AM - 6 PM</p>
    </footer>

</body>
</html>
